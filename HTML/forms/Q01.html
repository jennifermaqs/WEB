<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Torneio de Ciclismo</title>
    <meta charset="utf-8">
  </head>
  <body>
    <h1> Torneio de Ciclismo </h1>
    <form action="/destino.html"> 

      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" name="nome"><br><br>

      <label for="data_nascimento">Data de nascimento:</label>
      <input type="date" id="data_nascimento" name="data_nascimento"><br><br>

      <label for="modalidade">Modalidade de competição:</label>
      <select id="modalidade" name="modalidade">
        <option value="mountain bike">Mountain Bike</option>
        <option value="ciclismo de pista">Ciclismo de Estrada</option>  
      </select>
      <br><br>

      <label for="nível de experiência">Nível de experiência:</label>
      <select id="nivel_experiencia" name="nivel_experiencia">
        <option value="iniciante">Iniciante</option>
        <option value="intermediário">Intermediário</option>
        <option value="avançado">Avançado</option>
      </select>
      <br><br>

      <h4>Interesse em alimentação:</h4>

        <input type="checkbox" id="agua" name="alimentacao" value="agua">
        <label for="agua">Água</label><br>

        <input type="checkbox" id="lanche_rapido" name="alimentacao" value="lanche_rapido">
        <label for="lanche_rapido">Lanche Rápido</label><br>

        <input type="checkbox" id="lanche_reforcado" name="alimentacao" value="lanche_reforcado">
        <label for="lanche_reforcado">Lanche Reforçado</label><br>

        <input type="checkbox" id="coca_zero" name="alimentacao" value="coca_zero">
        <label for="coca_zero">Coca-Cola sem Açúcar</label><br>

        <input type="checkbox" id="barra_proteica" name="alimentacao" value="barra_proteica">
        <label for="barra_proteica">Barra Proteica</label><br>
        <br><br>
        
    
        <input type="checkbox" id="aceitacao_termos" name="aceitacao_termos" value="sim">
        <label for="aceitacao_termos">Eu li e aceito os termos e condições do torneio de ciclismo.</label>


      



      
      
    <br><br>
      <input type="submit" value="Enviar">
    </form>
     
  </body>
